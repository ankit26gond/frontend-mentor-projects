<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Ankit Gond" />
  <title>Blog Preview Card</title>
  <link rel="stylesheet" href="./static/styles/styles.css" />
  <link rel="shortcut icon" href="./assets/images/favicon-32x32.png" type="image/x-icon">
</head>
<body>

  <main>

    <div role="figure">
      <img src="./assets/images/illustration-article.svg" alt="article image" />
    </div>

    <div role="none">

      <p class="field">Learning</p>
      <p class="publish-date">Published 21 Dec 2023</p>
      
    </div>

    <article>

      <h1>
        <a href="#">HTML & CSS foundations</a>
      </h1>
      <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
      
    </article>

    <div aria-label="author" class="author">

      <img src="./assets/images/image-avatar.webp" alt="author image" />
      <p>Greg Hooper</p>
      
    </div>
    
  </main>

</body>
</html>
